name: Keep Render App Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL secret is not set"
            exit 0
          fi

          echo "Pinging $RENDER_HEALTH_URL"
          status_code=$(curl -L -s -o /tmp/render_health_response.txt -w "%{http_code}" --max-time 20 "$RENDER_HEALTH_URL" || true)

          echo "HTTP status: $status_code"
          echo "Response:"
          cat /tmp/render_health_response.txt || true

          if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 500 ]; then
            echo "Ping completed"
            exit 0
          fi

          echo "Ping failed or timed out, but not failing workflow"
          exit 0
